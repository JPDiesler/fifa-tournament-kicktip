<!doctype html>
<html lang="de" class="dark" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Apply the saved theme before paint (default dark) so there's no flash.
      (function () {
        try {
          var t = localStorage.getItem("theme") === "light" ? "light" : "dark";
          var el = document.documentElement;
          el.classList.toggle("dark", t === "dark");
          el.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>WM 2026 · Tippspiel · Albert Weil</title>
    <link rel="icon" type="image/jpeg" href="/icon.jpg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0d0d0d" />
    <link rel="apple-touch-icon" href="/icon.jpg" />
    <meta name="apple-mobile-web-app-title" content="WM-Tippspiel" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>
  <body class="bg-background text-foreground">
    <div id="root"></div>
    <script type="module" src="/src/app/main.jsx"></script>
  </body>
</html>
