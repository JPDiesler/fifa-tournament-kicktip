services:
  wm-tippspiel:
    build: .
    container_name: wm-tippspiel
    restart: unless-stopped
    ports:
      - "5173:8080"          # hinter deinen Reverse-Proxy hängen (wm.albertweil.de)
    environment:
      # --- bootstrap admin + session ---
      SESSION_SECRET: "${SESSION_SECRET}"               # Pflicht: langes Zufalls-Secret für Session-Cookies
      COOKIE_SECURE: "${COOKIE_SECURE:-auto}"           # auto = secure nur über HTTPS (lokal http + Prod https)
      ACCENT_COLOR: "${ACCENT_COLOR:-}"                 # Akzentfarbe (WM-Tipp + Turnierbaum-Pfad); leer = Ranglisten-Grün
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"               # Passwort des Bootstrap-Admins (Fallback: ADMIN_PIN)
      ADMIN_PIN: "${ADMIN_PIN}"                         # Fallback-Passwort, falls ADMIN_PASSWORD leer
      # Der ADMIN_USERNAME-Account ist immer Superadmin und KEIN Spieler (nicht in Rangliste/Tipps, kann nicht tippen).
      APP_URL: "${APP_URL:-https://wm.albertweil.de}" # Link im Zugangsdaten-PDF
      # --- Entra / MSAL (optional; leer = nur Basic-Login) ---
      ENTRA_TENANT_ID: "${ENTRA_TENANT_ID:-}"
      ENTRA_CLIENT_ID: "${ENTRA_CLIENT_ID:-}"           # SPA public client; kein Secret (Nutzerliste läuft delegiert im Browser)
      # --- Ergebnis-Quelle (API-Football, api-sports.io) ---
      # Einzige Datenquelle: liefert Ergebnisse, Live-Score/-Minute, Torschützen,
      # Karten, Aufstellungen, Statistik, Prognosen und Quoten. Der Key ist auch im
      # Web-Admin setzbar (überschreibt den env-Wert). Season 2026 braucht einen
      # kostenpflichtigen Plan. Rate/Tageslimit an den Plan anpassen — sie steuern
      # den Live-Poll-Takt; zu klein bremst das minütliche Live-Polling.
      API_FOOTBALL_KEY: "${API_FOOTBALL_KEY:-}"
      API_LEAGUE: "${API_LEAGUE:-1}"
      API_SEASON: "${API_SEASON:-2026}"
      API_RATE_LIMIT: "${API_RATE_LIMIT:-10}"
      API_DAILY_LIMIT: "${API_DAILY_LIMIT:-90}"
      DETAIL_MAX_PER_SYNC: "${DETAIL_MAX_PER_SYNC:-8}"   # max. Torschützen/Karten-Detail-Calls pro Sync (Budget-Schutz)
      SYNC_CRON: "${SYNC_CRON:-0 */6 * * *}"            # Sicherheits-Sync; Ergebnisse kommen primär automatisch zu Spielende-Zeiten
      # --- KI-Spieler (LLM-Tipper) ---
      # KI-Spieler werden im Admin angelegt (Provider + Modell + API-Key). Der API-Key
      # wird verschlüsselt gespeichert und nie ans Frontend geliefert. Pro Spiel genau
      # EIN LLM-Versuch, abgelegt ≥5 min vor Anpfiff (Trigger bei Anpfiff−10 min).
      AI_KEY_SECRET: "${AI_KEY_SECRET:-}"               # Schlüssel zur Verschlüsselung der KI-API-Keys at rest (Fallback: SESSION_SECRET). Setzen, damit eine SESSION_SECRET-Rotation die Keys nicht unlesbar macht.
      AI_TIP_CRON: "${AI_TIP_CRON:-* * * * *}"          # Takt des Tipp-Schedulers (jede Minute)
      AI_TRIGGER_LEAD_MIN: "${AI_TRIGGER_LEAD_MIN:-10}" # wie früh vor Anpfiff getippt wird (Puffer vor der −5-min-Sperre)
      AI_CHAMP_LEAD_MIN: "${AI_CHAMP_LEAD_MIN:-720}"    # Weltmeister-Tipp: Vorlauf vor K.o.-Start (Default 12 h → reifere Gruppendaten)
      AI_REASONING_VISIBLE_AFTER: "${AI_REASONING_VISIBLE_AFTER:-kickoff}" # kickoff | lock — ab wann die KI-Begründung sichtbar ist
      AI_FALLBACK: "${AI_FALLBACK:-off}"                # off = bei LLM-Fehler kein Tipp; on = deterministischer 1:1-Fallback (kein Prompt)
      AI_PROMPT_DIR: "${AI_PROMPT_DIR:-}"               # optional: Pfad zu den Prompt-Dateien (Default: server/prompts)
      AI_TIMEOUT_MS: "${AI_TIMEOUT_MS:-120000}"         # Timeout je LLM-Call (Reasoning-Modelle brauchen länger; verhindert ChatGPT-Timeouts)
      OPENAI_REASONING_EFFORT: "${OPENAI_REASONING_EFFORT:-low}" # gpt-5.x: low/medium/high/minimal; "" = weglassen (Nicht-Reasoning-Modelle)
    volumes:
      - wm_data:/data
      # Prompts ohne Rebuild editierbar machen (optional): das Verzeichnis mounten,
      # dann greifen Änderungen an aiPlayer.system.md / champion.system.md beim nächsten Job.
      # - ./server/prompts:/app/prompts
volumes:
  wm_data:
